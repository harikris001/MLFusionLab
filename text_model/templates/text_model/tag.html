{% extends 'core/base.html' %}

{% block title %} Classification {% endblock title %}

{% block content %}
<div class="continer m-3">
  <h1>Text-Based Models</h1>
  <h3 class="display-5 text-secondary">Classification</h3>
</div>

<div class="container-md">
  <form method="post" enctype="multipart/form-data" class="container-md py-2">
    {% csrf_token %}
    <input name="csv_file" accept=".csv" type="file" id="csv_file" class="form-control py-2" />
    <button type="submit" class="btn btn-primary my-2">Upload</button>
  </form>
  {{ df_table | safe }}
  {% if columns %}
  <p class="fs-5 fw-semibold fst-italic">Confirm the specifications:</p>
  <form method="post" enctype="multipart/form-data" class="mb-3">
    {% for col in columns %}
    <div class="conatiner">
      <label for="{{col}}" class="form-label w-25">{{col}}</label>
      <select name="{{col}}" class="mb-4 form-select w-25">
        <option value="string">String</option>
        <option value="integer">Integer</option>
        <option value="float">Float</option>
        <option value="unwanted">Unwanted</option>
      </select>
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Create Model</button>
  </form>
  {% endif %}
</div>
{% endblock content %}
